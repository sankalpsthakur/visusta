# Render Blueprint — https://render.com/docs/blueprint-spec
# Declares a persistent disk at /app/data and points every mutable runtime path
# at that disk so SQLite, drafts, chat history, evidence, exports, and client
# registry edits survive deploys + container restarts.
#
# IMPORTANT: the service name `visusta` MUST match the existing Render
# service. If the dashboard shows a different name, edit it here BEFORE
# linking the blueprint, otherwise Render will spin up a new service
# instead of attaching to the existing one.

services:
  - type: web
    name: visusta
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: VISUSTA_DATA_ROOT
        value: /app/data
      - key: VISUSTA_REGULATORY_DATA_DIR
        value: /app/data/regulatory_data
      - key: VISUSTA_OUTPUT_DIR
        value: /app/data/output
      - key: VISUSTA_CHARTS_DIR
        value: /app/data/charts
      - key: VISUSTA_CLIENTS_YAML
        value: /app/data/config/clients.yaml
    disk:
      name: visusta-data
      mountPath: /app/data
      sizeGB: 1
